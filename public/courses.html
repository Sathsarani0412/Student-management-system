<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Courses | EduCore</title>

    <!-- CSS -->
    <link rel="stylesheet" href="/css/courses.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <!-- LOGO -->

        <div class="logo">

            <img src="/images/logo.png">

            <div class="logo-text">
                <h2>EduCore</h2>
                <p>Student Management System</p>
            </div>

        </div>

        <!-- NAVBAR -->

        <nav>

            <ul>

                <li><a href="/">Home</a></li>

                <li><a href="/aboutus">About Us</a></li>

                <li><a href="/courses" class="active">Courses</a></li>

                <li><a href="/notices">Notices</a></li>

                <li><a href="/contactus">Contact</a></li>
                 <li><a href="/signup">Sign Up</a></li>
            </ul>

        </nav>

        <!-- BUTTONS -->

        <div class="header-buttons">

            <a href="/login" class="login-btn">
                <i class="fa-regular fa-user"></i>
                Login
            </a>

            <a href="/signup" class="signup-btn">
                <i class="fa-regular fa-user"></i>
                Sign Up
            </a>

        </div>

    </header>

    <!-- HERO SECTION -->

    <section class="hero">

        <h1>Our Courses</h1>

        <p>
            Explore professional and academic programs designed
            to build knowledge, improve skills, and support
            student success.
        </p>

    </section>

    <!-- COURSES SECTION -->

    <section
class="courses-section"
id="coursesContainer">

</section>

<script>

const container =
document.getElementById(
    "coursesContainer"
);

fetch("/courses-data")
.then(res => res.json())
.then(data => {

    container.innerHTML = "";

    data.forEach(course => {

        container.innerHTML += `

        <div class="course-card">

            <img
            src="${course.image}"
            style="
            width:100%;
            height:200px;
            object-fit:cover;
            border-radius:10px;
            ">

            <div class="icon-box">

                <i class="${course.icon}"></i>

            </div>

            <h2>
                ${course.title}
            </h2>

            <p>
                ${course.description}
            </p>

        </div>

        `;

    });

});

</script>
</body>

</html>
