<!-- notices.html -->

<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Notices | EduCare</title>

    <link rel="stylesheet" href="/css/notices.css">

    <!-- GOOGLE FONT -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <!-- FONT AWESOME -->
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

    <!-- HEADER -->

    <header>

        <div class="logo">

            <img src="/images/logo.png">

            <div>
                <h2>EduCare</h2>
                <p>Student Management System</p>
            </div>

        </div>

        <nav>

            <ul>

                <li><a href="/">Home</a></li>
                <li><a href="/aboutus">About Us</a></li>
                <li><a href="/courses">Courses</a></li>
                <li><a href="/notices" class="active">Notices</a></li>
                <li><a href="/contactus">Contact</a></li>
                 <li><a href="/signup">Sign Up</a></li>

            </ul>

        </nav>

        <div class="header-buttons">

            <a href="/login" class="login-btn">
                <i class="fa-regular fa-user"></i>
                Login
            </a>

            <a href="/signup" class="signup-btn">
                <i class="fa-regular fa-user"></i>
                Sign Up
            </a>

        </div>

    </header>

    <!-- HERO -->

    <section class="hero">

        <h1>Latest Notices</h1>

        <p>
            Stay updated with important announcements,
            academic schedules, exams, and student activities.
        </p>

    </section>

    <!-- NOTICES -->

  <section class="notice-section" id="noticeContainer">

</section>
 
<script>

fetch("/notices-data")
.then(res => res.json())
.then(data => {

    const container =
    document.getElementById("noticeContainer");

    data.forEach(notice => {

        container.innerHTML += `

        <div class="notice-card">

            <div class="notice-top">

                <span class="date">
                    ${notice.created_at}
                </span>

                <span class="tag">
                    ${notice.category}
                </span>

            </div>

            <h2>${notice.title}</h2>

            <p>${notice.description}</p>

        </div>

        `;

    });

});

</script>

</body>

</html>
